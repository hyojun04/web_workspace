<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>box</title>
    <style>
        .my_border{
            border: dashed 10px red;
            margin: 20px
        }
        .my_border2{
            margin:10px 20px 30px 40px;
            border-color: blue yellow green red;
            border-style : dotted solid;
            border-width : 50px 10px 15px 20px;
        }
        .my_border3{
            box-sizing: border-box;
            padding:20px 50px;
            width: 200px; height: 200px;        
            border: 5px solid red;
            border-radius: 50px 25px 100px 10px
        }
    </style>
</head>
<body>
    <div class="my_border">
        박스 요소입니다.
    </div>
    <div class="my_border2">
        박스요소입니다
    </div>
    <div class ="my_border3">
        박스 요소입니다.
        박스 요소입니다.
        박스 요소입니다.
    </div>
</body>
</html>
