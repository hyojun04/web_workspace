<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>box-shadow</title>
    <style>
        div.box1{
            width: 100px; height: 100px;
            background-color: orange;
            box-shadow: 12px 24px 5px 8px rgba(255,0,0,0.4);
        }
        div.box2{
            margin-top : 100px;
            width: 100px; height: 100px;
            background-color: cyan;
            box-shadow: 8px 8px 5px 3px rgba(0,0,255,0.4) inset;
        }
    </style>
</head>
<body>
    <div class="box1"></div>
    <div class="box2"></div>
</body>
</html>
