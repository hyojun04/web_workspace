<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Print</title>
    <style>
        @media print{
            a:after{
                content: "("attr(href)")";                
            }
        }
    </style>
</head>
<body>
<a href="https://www.javaspecialist.co.kr">자바전문가그룹</a>  
<a href="https://www.youtube.com/watch?v=F0etwoax1rk">자바강의</a>  
</body>
</html>
