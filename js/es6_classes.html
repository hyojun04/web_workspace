<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>classes</title>
    <script>
        class Car{
            constructor(name){
                this.brand = name;
            }
            present(){
                return 'I have a '+this.brand;
            }
        }
        class Model extends Car{
            constructor(name,mod){
                super(name);
                this.model = mod;
            }
            present(){
                return super.present()+', it is a '+this.model;
            }
        }
        const mycar = new Model("Ford","Mustang");
        document.write(mycar.model+"<br>");
        document.write(mycar.present()+"<br>");
    </script>
</head>
<body>
    
</body>
</html>
