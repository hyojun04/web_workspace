<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>function2</title>
    <script>
        var fact = (function(n){
            let self = arguments.callee;
            if(n==0){
                return 1;
            }
            else{
                return(n*self(n-1));
            }
        })(10);
        console.log(fact);
        document.write(fact);
    </script>
</head>
